      - multidict
      - propcache
      - yarl
      - httpcore
      - h11
      - anyio
      - sniffio
      - idna
      - charset-normalizer
      - urllib3

      # ================= YT-DLP OPTIONAL =================
      # Cac dependency tuy chon cua yt-dlp (giam loi parse metadata)
      - pycryptodome
      - pycryptodomex
      - mutagen
      - atomicwrites
      - xattr
      - cryptography
      - cffi
      - pycparser

      # ================= HTTP / OAUTH =================
      - httplib2
      - pyparsing
      - oauthlib
      - requests-oauthlib
      - pyasn1
      - pyasn1_modules
      - uritemplate
      - rsa

      # ================= SUPPORT LIBS =================
      - attrs
