name: crawl

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - ffmpeg
  - git
  - pip
  - nodejs

  - pip:
      # ================= CORE =================
      - numpy
      - pandas
      - scipy
      - tqdm
      - scikit-learn
      - networkx
      - joblib

      # ================= YOUTUBE =================
      - google-api-python-client
      - google-api-core
      - google-auth
      - google-auth-httplib2
      - google-auth-oauthlib
      - googleapis-common-protos
      - yt-dlp
      - yt-dlp-ejs
      - bgutil-ytdlp-pot-provider
      - youtube-transcript-api

      # ================= WEB / HTML =================
      - requests
      - httpx
      - beautifulsoup4
      - lxml
      - soupsieve

      # ================= SELENIUM =================
      - selenium
      - webdriver-manager

      # ================= AUDIO =================
      - librosa
      - soundfile
      - pydub
      - audioread
      - soxr
      - av
      - pooch
      - lazy-loader

      # ================= AI / LLM =================
      - anthropic
      - openai
      - transformers
      - tokenizers
      - sentencepiece
      - accelerate
      - safetensors
      - hf-xet
      - huggingface_hub
      - qwen-omni-utils

      # ================= SONIOX =================
      - soniox

      # ================= DATA =================
      - datasets
      - pyarrow
      - dill
      - multiprocess
      - fsspec

      # ================= OPTIONAL NLP =================
      # Korean tokenizers (used in some scripts)
      - nagisa
      - soynlp

      # ================= UTILITIES =================
      - python-dotenv
      - rich
      - orjson
      - pyyaml
      - python-slugify
      - text-unidecode
      - python-dateutil
      - pydantic
      - click
      - typer
      - shellingham
      - jupyter_core
      - jupytext
      - nbformat
      - kaggle

      # ================= VPN / PROTON =================
      # Can cho protonvpn + openvpn de fake IP (su dung --use-vpn)
      - openvpn
      - protonvpn-cli
      - pythondialog

      # ================= YT-DLP EXTRA DEPENDENCIES =================
      # Can cho js runtime (js_runtimes: {"node": {}} trong script)
      # Can cho web client / HTTP/2 de bypass "Sign in to confirm" cua YouTube
